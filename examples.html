<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PROOF: Examples</title>
<script src="https://cdn.tailwindcss.com"></script>

<style>
html {
  scroll-snap-type: y mandatory;
}

.snap-section {
  scroll-snap-align: start;
}

.fade-up {
  opacity: 0;
  transform: translateY(30px);
  transition: all 0.8s ease;
}

.fade-up.active {
  opacity: 1;
  transform: translateY(0);
}
</style>
</head>

<body class="bg-black text-white font-sans overflow-x-hidden">

<!-- NAV -->
<header class="fixed top-0 w-full bg-black/60 backdrop-blur z-50">
  <div class="max-w-6xl mx-auto flex justify-between items-center py-3 px-4">
    <img src="Proof_header_good.png" class="h-[40px] md:h-[60px] scale-[2.5] origin-left"/>
  </div>
</header>

<!-- HERO -->
<section class="snap-section min-h-screen flex items-center justify-center text-center px-4">
  <div class="fade-up">
    <h1 class="text-[32px] md:text-[56px] mb-4">Examples</h1>
    <p class="text-gray-400 max-w-xl mx-auto">
      Watch ideas become something real.
    </p>
  </div>
</section>

<!-- SECTION 1 -->
<section class="snap-section relative min-h-screen flex items-end">

  <video muted loop playsinline class="video-bg absolute inset-0 w-full h-full object-cover opacity-70">
    <source src="LaunchBox_Main.mp4" type="video/mp4">
  </video>

  <div class="absolute inset-0 bg-black/50"></div>

  <div class="relative z-10 max-w-6xl mx-auto px-6 pb-20 fade-up">
    <h2 class="text-[28px] md:text-[48px] mb-4">PROOF: Scene</h2>
    <p class="text-gray-300 max-w-md mb-6">
      Experience tone, pacing, and character instantly.
    </p>
    <a href="scene.html" class="bg-[#0066FF] px-6 py-3 rounded-md">View Product</a>
  </div>

</section>

<!-- SECTION 2 -->
<section class="snap-section relative min-h-screen flex items-end">

  <video muted loop playsinline class="video-bg absolute inset-0 w-full h-full object-cover opacity-70">
    <source src="Bad Bella Animated Logo.mp4" type="video/mp4">
  </video>

  <div class="absolute inset-0 bg-black/50"></div>

  <div class="relative z-10 max-w-6xl mx-auto px-6 pb-20 text-left md:text-right md:ml-auto fade-up">
    <h2 class="text-[28px] md:text-[48px] mb-4">PROOF: Sizzle</h2>
    <p class="text-gray-300 max-w-md md:ml-auto mb-6">
      Fast visual proof that creates immediate momentum.
    </p>
    <a href="sizzle.html" class="bg-[#0066FF] px-6 py-3 rounded-md">View Product</a>
  </div>

</section>

<!-- SECTION 3 -->
<section class="snap-section relative min-h-screen flex items-end">

  <video muted loop playsinline class="video-bg absolute inset-0 w-full h-full object-cover opacity-70">
    <source src="Bad Ass Raven.mp4" type="video/mp4">
  </video>

  <div class="absolute inset-0 bg-black/50"></div>

  <div class="relative z-10 max-w-6xl mx-auto px-6 pb-20 fade-up">
    <h2 class="text-[28px] md:text-[48px] mb-4">PROOF: Trailer</h2>
    <p class="text-gray-300 max-w-md mb-6">
      Turn interest into belief with a full cinematic asset.
    </p>
    <a href="index.html#products" class="bg-[#0066FF] px-6 py-3 rounded-md">
      Get Started
    </a>
  </div>

</section>

<!-- SCRIPT -->
<script>

// FADE IN TEXT
const faders = document.querySelectorAll('.fade-up');

const observer = new IntersectionObserver((entries) => {
  entries.forEach(entry => {
    if (entry.isIntersecting) {
      entry.target.classList.add('active');
    }
  });
}, { threshold: 0.4 });

faders.forEach(el => observer.observe(el));


// VIDEO PLAY/PAUSE BASED ON VIEW
const videos = document.querySelectorAll('.video-bg');

const videoObserver = new IntersectionObserver((entries) => {
  entries.forEach(entry => {
    const video = entry.target;

    if (entry.isIntersecting) {
      video.play();
    } else {
      video.pause();
    }
  });
}, { threshold: 0.6 });

videos.forEach(video => videoObserver.observe(video));

</script>

</body>
</html>
