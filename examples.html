<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PROOF: Examples</title>
<script src="https://cdn.tailwindcss.com"></script>

<style>
body {
  margin: 0;
  background: #0A0A0A;
  color: white;
  font-family: sans-serif;
}

/* SNAP */
.container {
  height: 100vh;
  overflow-y: scroll;
  scroll-snap-type: y mandatory;
}

.section {
  height: 100vh;
  scroll-snap-align: start;
  position: relative;
}

/* VIDEO */
video {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* OVERLAY */
.overlay {
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0.55);
}

/* TEXT */
.content {
  position: absolute;
  bottom: 80px;
  left: 5%;
  max-width: 500px;
  opacity: 0;
  transform: translateY(40px);
  transition: all 0.8s ease;
}

.content.active {
  opacity: 1;
  transform: translateY(0);
}

.right {
  left: auto;
  right: 5%;
  text-align: right;
}

/* BUTTON */
.btn {
  background: #0066FF;
  padding: 12px 24px;
  display: inline-block;
  margin-top: 16px;
  border-radius: 6px;
}
</style>
</head>

<body>

<!-- NAV -->
<header style="position:fixed;top:0;width:100%;z-index:100;background:rgba(0,0,0,0.6);backdrop-filter:blur(8px);padding:12px 20px;">
  <img src="Proof_header_good.png" style="height:40px;">
</header>

<div class="container" id="scrollContainer">

<!-- SECTION 1 -->
<section class="section">
  <video class="scroll-video" src="LaunchBox_Main.mp4" muted></video>
  <div class="overlay"></div>

  <div class="content">
    <h2 style="font-size:32px;">PROOF: Scene</h2>
    <p>Experience tone, pacing, and character instantly.</p>
    <a href="scene.html" class="btn">View Product</a>
  </div>
</section>

<!-- SECTION 2 -->
<section class="section">
  <video class="scroll-video" src="Bad Bella Animated Logo.mp4" muted></video>
  <div class="overlay"></div>

  <div class="content right">
    <h2 style="font-size:32px;">PROOF: Sizzle</h2>
    <p>Fast visual proof that creates immediate momentum.</p>
    <a href="sizzle.html" class="btn">View Product</a>
  </div>
</section>

<!-- SECTION 3 -->
<section class="section">
  <video class="scroll-video" src="Bad Ass Raven.mp4" muted></video>
  <div class="overlay"></div>

  <div class="content">
    <h2 style="font-size:32px;">PROOF: Trailer</h2>
    <p>Turn interest into belief with a full cinematic asset.</p>
    <a href="index.html#products" class="btn">Get Started</a>
  </div>
</section>

</div>

<script>

const container = document.getElementById("scrollContainer");
const videos = document.querySelectorAll(".scroll-video");
const contents = document.querySelectorAll(".content");

function handleScroll() {

  const sections = document.querySelectorAll(".section");

  sections.forEach((section, index) => {

    const rect = section.getBoundingClientRect();
    const video = videos[index];
    const content = contents[index];

    const visible = rect.top >= 0 && rect.top < window.innerHeight;

    if (visible) {

      // ACTIVATE TEXT
      content.classList.add("active");

      // SCROLL CONTROL VIDEO
      const progress = 1 - rect.top / window.innerHeight;
      const duration = video.duration || 1;

      video.currentTime = duration * progress;

    } else {
      content.classList.remove("active");
    }

  });

}

videos.forEach(v => {
  v.addEventListener("loadedmetadata", () => {
    v.pause();
  });
});

container.addEventListener("scroll", handleScroll);

</script>

</body>
</html>
